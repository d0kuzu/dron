<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Opportunity Analyzer</title>
    <meta name="description" content="SAM.gov drone opportunity analyzer with configurable parameters">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
:root {
    --bg-color: #0f172a;
    --panel-bg: rgba(30, 41, 59, 0.7);
    --panel-border: rgba(255, 255, 255, 0.1);
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --accent-color: #3b82f6;
    --accent-hover: #2563eb;
    --danger-color: #ef4444;
    --success-color: #10b981;
    --warning-color: #f59e0b;
    --card-bg: rgba(30, 41, 59, 0.5);
    --card-hover: rgba(30, 41, 59, 0.9);
    --input-bg: rgba(15, 23, 42, 0.6);
    --input-border: rgba(255, 255, 255, 0.15);
    --input-focus: rgba(59, 130, 246, 0.5);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-color);
    color: var(--text-primary);
    min-height: 100vh;
    background-image: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                      radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15), transparent 25%);
    background-attachment: fixed;
}

.app-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
}

.glass-panel {
    background: var(--panel-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
}

header {
    padding: 1.5rem 2rem;
    margin-bottom: 2rem;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
}

.header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

h1 {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    background: linear-gradient(to right, #60a5fa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    color: var(--text-secondary);
    font-size: 0.95rem;
}

button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    transition: all 0.2s ease;
}

.primary-btn {
    background-color: var(--accent-color);
    color: white;
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
}

.primary-btn:hover:not(:disabled) {
    background-color: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(59, 130, 246, 0.23);
}

.primary-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}

.secondary-btn {
    background-color: transparent;
    color: var(--text-primary);
    border: 1px solid var(--panel-border);
    padding: 0.75rem 1.5rem;
}

.secondary-btn:hover {
    background-color: rgba(255, 255, 255, 0.05);
}

.success-btn {
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.35);
}

.success-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
}

.success-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}

.warning-btn {
    background: rgba(245, 158, 11, 0.15);
    color: var(--warning-color);
    border: 1px solid rgba(245, 158, 11, 0.3);
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.warning-btn:hover {
    background: rgba(245, 158, 11, 0.25);
}

.loader {
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    border-top-color: white;
    animation: spin 1s ease-in-out infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.hidden {
    display: none !important;
}

/* Tabs */
.tabs {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
}

.tab-btn {
    background: none;
    color: var(--text-secondary);
    padding: 0.75rem 1.5rem;
    border-bottom: 2px solid transparent;
    border-radius: 0;
    font-size: 1.05rem;
}

.tab-btn.active {
    color: var(--text-primary);
    border-bottom-color: var(--accent-color);
}

.tab-btn:hover:not(.active) {
    color: var(--text-primary);
}

.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Cards */
.cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.5rem;
}

.card {
    background: var(--card-bg);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 1.5rem;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.card:hover {
    background: var(--card-hover);
    transform: translateY(-4px);
    border-color: rgba(255, 255, 255, 0.2);
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
}

.card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
}

.card-title {
    font-size: 1.1rem;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text-primary);
}

.score-badge {
    background: rgba(59, 130, 246, 0.2);
    color: #60a5fa;
    padding: 0.25rem 0.6rem;
    border-radius: 20px;
    font-weight: 700;
    font-size: 0.9rem;
    white-space: nowrap;
}

.card-body {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    flex-grow: 1;
}

.info-row {
    display: flex;
    gap: 0.5rem;
    font-size: 0.9rem;
}

.info-label {
    color: var(--text-secondary);
    min-width: 80px;
}

.info-value {
    color: var(--text-primary);
    word-break: break-word;
}

.reasons-list {
    margin-top: 0.5rem;
    padding-top: 0.5rem;
    border-top: 1px solid var(--panel-border);
    font-size: 0.85rem;
    color: var(--text-secondary);
}

.reasons-list ul {
    padding-left: 1.2rem;
    margin-top: 0.3rem;
}

.card-footer {
    margin-top: auto;
    padding-top: 1rem;
}

.link-btn {
    display: inline-block;
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-primary);
    text-decoration: none;
    padding: 0.6rem 1rem;
    border-radius: 6px;
    font-size: 0.9rem;
    font-weight: 500;
    text-align: center;
    width: 100%;
    transition: background 0.2s;
    border: 1px solid var(--panel-border);
}

.link-btn:hover {
    background: rgba(255, 255, 255, 0.1);
}

/* Dialog */
.dialog-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.2s ease;
}

.dialog {
    width: 90%;
    max-width: 450px;
    padding: 2rem;
    text-align: center;
}

.dialog h3 {
    font-size: 1.4rem;
    margin-bottom: 1rem;
    color: var(--text-primary);
}

.dialog p {
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
    line-height: 1.5;
}

.dialog-actions {
    display: flex;
    justify-content: center;
    gap: 1rem;
}

/* ===================== SETTINGS PANEL ===================== */
.settings-container {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
}

.settings-section {
    background: var(--card-bg);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    overflow: hidden;
    transition: all 0.3s ease;
}

.settings-section:hover {
    border-color: rgba(255, 255, 255, 0.18);
}

.section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 1.5rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
}

.section-header:hover {
    background: rgba(255, 255, 255, 0.03);
}

.section-header-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.section-icon {
    font-size: 1.3rem;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(59, 130, 246, 0.12);
    border-radius: 10px;
}

.section-title {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text-primary);
}

.section-subtitle {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-top: 0.15rem;
}

.section-chevron {
    font-size: 1.2rem;
    color: var(--text-secondary);
    transition: transform 0.3s ease;
}

.section-chevron.open {
    transform: rotate(180deg);
}

.section-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease, padding 0.3s ease;
}

.section-body.open {
    max-height: 2000px;
    padding: 0 1.5rem 1.5rem;
}

.field-group {
    margin-bottom: 1.2rem;
}

.field-group:last-child {
    margin-bottom: 0;
}

.field-label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 0.5rem;
    letter-spacing: 0.02em;
}

.field-input {
    width: 100%;
    padding: 0.65rem 0.9rem;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 0.9rem;
    transition: all 0.2s ease;
    outline: none;
}

.field-input:focus {
    border-color: var(--accent-color);
    box-shadow: 0 0 0 3px var(--input-focus);
}

.field-input::placeholder {
    color: rgba(148, 163, 184, 0.5);
}

/* Number input with inline label */
.number-field {
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.number-field .field-input {
    width: 100px;
    text-align: center;
}

.number-field .field-unit {
    color: var(--text-secondary);
    font-size: 0.85rem;
}

/* Tag input */
.tag-container {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    padding: 0.6rem;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 10px;
    min-height: 44px;
    align-items: center;
    transition: all 0.2s ease;
}

.tag-container:focus-within {
    border-color: var(--accent-color);
    box-shadow: 0 0 0 3px var(--input-focus);
}

.tag {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.3rem 0.6rem;
    background: rgba(59, 130, 246, 0.15);
    border: 1px solid rgba(59, 130, 246, 0.25);
    border-radius: 6px;
    font-size: 0.82rem;
    color: #93c5fd;
    white-space: nowrap;
    animation: tagIn 0.2s ease;
}

@keyframes tagIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
}

.tag-remove {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: rgba(239, 68, 68, 0.2);
    color: #f87171;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.15s ease;
    border: none;
    padding: 0;
    line-height: 1;
}

.tag-remove:hover {
    background: rgba(239, 68, 68, 0.5);
    color: white;
}

.tag-input {
    border: none;
    background: transparent;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
    min-width: 120px;
    flex: 1;
}

.tag-input::placeholder {
    color: rgba(148, 163, 184, 0.4);
}

/* Scoring weight sliders */
.weight-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
}

.weight-item {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    padding: 0.9rem;
    background: rgba(15, 23, 42, 0.4);
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.06);
}

.weight-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.weight-name {
    font-size: 0.82rem;
    color: var(--text-secondary);
    font-weight: 500;
}

.weight-value {
    font-size: 0.9rem;
    font-weight: 700;
    min-width: 28px;
    text-align: right;
}

.weight-value.positive { color: var(--success-color); }
.weight-value.negative { color: var(--danger-color); }
.weight-value.zero { color: var(--text-secondary); }

.weight-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.1);
    outline: none;
    transition: background 0.2s;
}

.weight-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent-color);
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(59, 130, 246, 0.4);
    transition: transform 0.15s;
}

.weight-slider::-webkit-slider-thumb:hover {
    transform: scale(1.2);
}

.weight-slider::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent-color);
    cursor: pointer;
    border: none;
    box-shadow: 0 2px 8px rgba(59, 130, 246, 0.4);
}

/* Settings actions bar */
.settings-actions {
    display: flex;
    gap: 1rem;
    justify-content: flex-end;
    padding: 1.5rem 0;
    position: sticky;
    bottom: 0;
    z-index: 10;
}

.settings-actions::before {
    content: '';
    position: absolute;
    inset: -20px 0 0 0;
    background: linear-gradient(to bottom, transparent, var(--bg-color) 30%);
    z-index: -1;
    pointer-events: none;
}

/* Toast notification */
.toast-container {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
}

.toast {
    padding: 0.9rem 1.4rem;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 500;
    color: white;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
    animation: toastIn 0.35s ease, toastOut 0.35s ease 2.8s forwards;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    backdrop-filter: blur(8px);
}

.toast.success {
    background: rgba(16, 185, 129, 0.9);
    border: 1px solid rgba(16, 185, 129, 0.5);
}

.toast.error {
    background: rgba(239, 68, 68, 0.9);
    border: 1px solid rgba(239, 68, 68, 0.5);
}

.toast.info {
    background: rgba(59, 130, 246, 0.9);
    border: 1px solid rgba(59, 130, 246, 0.5);
}

@keyframes toastIn {
    from { opacity: 0; transform: translateX(40px); }
    to { opacity: 1; transform: translateX(0); }
}

@keyframes toastOut {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(40px); }
}

/* Threshold fields */
.threshold-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
}

.threshold-item {
    padding: 1rem;
    background: rgba(15, 23, 42, 0.4);
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.06);
}

.threshold-item label {
    display: block;
    font-size: 0.82rem;
    color: var(--text-secondary);
    font-weight: 500;
    margin-bottom: 0.5rem;
}

.threshold-item .field-input {
    width: 100%;
}

/* SAM URLs field */
.url-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.url-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
}

.url-row .field-input {
    flex: 1;
}

.url-remove-btn {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: rgba(239, 68, 68, 0.15);
    color: #f87171;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    transition: all 0.15s;
    border: none;
    cursor: pointer;
    flex-shrink: 0;
}

.url-remove-btn:hover {
    background: rgba(239, 68, 68, 0.35);
}

.add-url-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    background: rgba(59, 130, 246, 0.1);
    color: #60a5fa;
    border: 1px dashed rgba(59, 130, 246, 0.3);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
    width: fit-content;
    margin-top: 0.25rem;
}

.add-url-btn:hover {
    background: rgba(59, 130, 246, 0.2);
}

/* Unsaved changes indicator */
.unsaved-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--warning-color);
    display: inline-block;
    animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}
    </style>
</head>
<body>
    <div class="app-container">
        <header class="glass-panel">
            <div class="header-content">
                <div>
                    <h1>Drone Opportunity Analyzer</h1>
                    <p class="subtitle" id="last-updated">Загрузка данных...</p>
                </div>
                <button id="refresh-btn" class="primary-btn">
                    <span class="btn-text">Загрузить новые</span>
                    <div class="loader hidden"></div>
                </button>
            </div>
        </header>

        <!-- Confirmation Dialog -->
        <div id="confirm-dialog" class="dialog-overlay hidden">
            <div class="dialog glass-panel">
                <h3>Подтверждение</h3>
                <p>Вы уверены, что хотите запустить скрипт? SAM.gov разрешает только 1-2 запроса в день, частые запросы могут привести к блокировке.</p>
                <div class="dialog-actions">
                    <button id="cancel-btn" class="secondary-btn">Отмена</button>
                    <button id="confirm-btn" class="primary-btn">Да, запустить</button>
                </div>
            </div>
        </div>

        <!-- Toast container -->
        <div id="toast-container" class="toast-container"></div>

        <main>
            <div class="tabs">
                <button class="tab-btn active" data-target="matched-list">Подходящие заказы</button>
                <button class="tab-btn" data-target="excluded-list">Отклоненные заказы</button>
                <button class="tab-btn" data-target="settings-panel">⚙️ Настройки дрона</button>
            </div>

            <div id="matched-list" class="tab-content active list-container">
                <div class="cards-grid" id="matched-cards">
                    <!-- Cards will be injected here -->
                </div>
            </div>

            <div id="excluded-list" class="tab-content list-container">
                <div class="cards-grid" id="excluded-cards">
                    <!-- Cards will be injected here -->
                </div>
            </div>

            <div id="settings-panel" class="tab-content">
                <div class="settings-actions" style="justify-content: flex-start; border-bottom: 1px solid var(--panel-border); padding-bottom: 1.5rem; margin-bottom: 1.5rem;">
                    <div style="display: flex; gap: 1rem; align-items: center;">
                        <input type="file" id="docx-upload" accept=".docx" class="hidden">
                        <button id="upload-docx-btn" class="primary-btn" style="background-color: #8b5cf6;">
                            <span class="upload-text">📄 Автозаполнение из DOCX</span>
                            <div class="loader hidden"></div>
                        </button>
                        <span style="font-size: 0.85rem; color: var(--text-secondary);">Выберите документ для извлечения характеристик</span>
                    </div>
                </div>
                <div class="settings-container" id="settings-container">
                    <!-- Settings sections will be injected here -->
                </div>
                <div class="settings-actions">
                    <button id="reset-config-btn" class="warning-btn">
                        ↩️ Сбросить к дефолтным
                    </button>
                    <button id="save-config-btn" class="success-btn">
                        <span class="save-text">💾 Сохранить настройки</span>
                        <div class="loader hidden"></div>
                    </button>
                </div>
            </div>
        </main>
    </div>
    <script>
document.addEventListener('DOMContentLoaded', () => {
    // ===================== ELEMENT REFS =====================
    const refreshBtn = document.getElementById('refresh-btn');
    const btnText = refreshBtn.querySelector('.btn-text');
    const loader = refreshBtn.querySelector('.loader');
    const lastUpdatedEl = document.getElementById('last-updated');
    
    const confirmDialog = document.getElementById('confirm-dialog');
    const confirmBtn = document.getElementById('confirm-btn');

    // ===================== DATE FORMAT =====================
    function formatDate(isoString) {
        if (!isoString) return 'Неизвестно';
        const date = new Date(isoString);
        return new Intl.DateTimeFormat('ru-RU', {
            day: 'numeric', month: 'long', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
        }).format(date);
    }

    // ===================== CARD =====================
    function createCard(item) {
        const score = item.match_analysis?.total_score ?? 0;
        const reasons = item.match_analysis?.reasons || [];
        
        const reasonsHtml = reasons.length > 0 
            ? `<div class="reasons-list">
                <strong>Причины:</strong>
                <ul>${reasons.map(r => `<li>${r}</li>`).join('')}</ul>
               </div>` 
            : '';

        return `
            <div class="card">
                <div class="card-header">
                    <div class="card-title">${item.title || 'Без названия'}</div>
                    <div class="score-badge">Счет: ${score}</div>
                </div>
                <div class="card-body">
                    <div class="info-row">
                        <span class="info-label">Агентство:</span>
                        <span class="info-value">${item.department_bucket || item.agency || 'Н/Д'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Дедлайн:</span>
                        <span class="info-value">${item.response_deadline || 'Н/Д'}</span>
                    </div>
                    ${reasonsHtml}
                </div>
                <div class="card-footer">
                    <a href="${item.sam_link}" target="_blank" class="link-btn">Открыть на SAM.gov</a>
                </div>
            </div>
        `;
    }

    function renderData(data) {
        const matched = data.matched?.opportunities || [];
        const excluded = data.excluded?.opportunities || [];
        const generatedAt = data.matched?.generated_at;

        if (generatedAt) {
            lastUpdatedEl.textContent = `Последний запуск: ${formatDate(generatedAt)}`;
        }

        matchedCards.innerHTML = matched.length > 0 
            ? matched.map(createCard).join('') 
            : '<p class="subtitle">Нет подходящих заказов</p>';
            
        excludedCards.innerHTML = excluded.length > 0 
            ? excluded.map(createCard).join('') 
            : '<p class="subtitle">Нет отклоненных заказов</p>';
    }

        try {
            const base = window.location.pathname.endsWith('/') ? window.location.pathname : window.location.pathname + '/';
            const res = await fetch(base + 'drone-data');
            if (!res.ok) {
                const text = await res.text();
                throw new Error(`HTTP ${res.status}: ${text}`);
            }
            const data = await res.json();
            renderData(data);
        } catch (error) {
            console.error('Ошибка загрузки данных:', error);
            lastUpdatedEl.textContent = `Детали ошибки: ${error.message}`;
            lastUpdatedEl.style.color = 'var(--danger-color)';

            const res = await fetch(base + 'drone-refresh', { method: 'POST' });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || 'Ошибка выполнения');
            }
            const data = await res.json();
            renderData(data);
        } catch (error) {
            console.error('Ошибка при обновлении:', error);
            
            const errorStr = error.message.toLowerCase();
            if (errorStr.includes('429') || errorStr.includes('throttled') || errorStr.includes('quota') || errorStr.includes('too many requests')) {
                alert('Лимит запросов исчерпан! SAM.gov временно заблокировал доступ (обычно до следующего дня). На экране остались старые данные.');

                lastUpdatedEl.style.color = 'var(--danger-color)';
            } else {
                alert(`Произошла ошибка: ${error.message}`);

            }
        } finally {

    // ===================== TAG INPUT HELPER =====================
    function createTagInput(container, tags, placeholder = 'Введите и нажмите Enter...') {
        const wrapper = document.createElement('div');
        wrapper.className = 'tag-container';
        
        const renderTags = () => {
            wrapper.querySelectorAll('.tag').forEach(t => t.remove());
            const input = wrapper.querySelector('.tag-input');
            tags.forEach((tag, i) => {
                const el = document.createElement('span');
                el.className = 'tag';
                el.innerHTML = `<span class="tag-text">${escapeHtml(tag)}</span><button class="tag-remove" data-index="${i}">×</button>`;
                wrapper.insertBefore(el, input);
            });
        };

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'tag-input';
        input.placeholder = placeholder;
        
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && input.value.trim()) {
                e.preventDefault();
                tags.push(input.value.trim());
                input.value = '';
                renderTags();
                markUnsaved();
            }
            if (e.key === 'Backspace' && !input.value && tags.length > 0) {
                tags.pop();
                renderTags();
                markUnsaved();
            }
        });

        wrapper.addEventListener('click', (e) => {
            if (e.target.classList.contains('tag-remove')) {
                const idx = parseInt(e.target.dataset.index);
                tags.splice(idx, 1);
                renderTags();
                markUnsaved();
            }
            input.focus();
        });

        wrapper.appendChild(input);
        renderTags();
        container.appendChild(wrapper);
        return { tags, wrapper };
    }

                row.innerHTML = `
                    <input type="text" class="field-input" value="${escapeHtml(url)}" data-url-idx="${i}">

            samUrls.push('');
            renderUrls();
            markUnsaved();
            const inputs = urlsContainer.querySelectorAll('.field-input');
            if (inputs.length) inputs[inputs.length - 1].focus();
        });

            keywords: collectKeywords(),
            competitors: collectCompetitors(),
            patterns: collectPatterns(),
            scoring_weights: collectWeights(),
            small_biz_codes: collectSmallBiz(),
            match_thresholds: collectThresholds(),
        };

        const saveText = saveConfigBtn.querySelector('.save-text');
        const saveLoader = saveConfigBtn.querySelector('.loader');
        saveConfigBtn.disabled = true;
        saveText.textContent = 'Сохранение...';
        saveLoader.classList.remove('hidden');

        try {
            const base = window.location.pathname.endsWith('/') ? window.location.pathname : window.location.pathname + '/';
            const res = await fetch(base + 'drone-config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ config: newConfig }),
            });

            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || 'Ошибка сохранения');
            }

            const data = await res.json();
            currentConfig = data.config;
            hasUnsavedChanges = false;
            showToast('Настройки успешно сохранены!', 'success');
        } catch (err) {
            console.error('Ошибка сохранения:', err);
            showToast('Ошибка сохранения: ' + err.message, 'error');
        } finally {
            saveConfigBtn.disabled = false;
            saveText.textContent = '💾 Сохранить настройки';
            saveLoader.classList.add('hidden');
        }
    });

    // ===================== RESET CONFIG =====================
    resetConfigBtn.addEventListener('click', () => {
        if (!defaultConfig) {
            showToast('Дефолтный конфиг не загружен', 'error');
            return;
        }
        if (!confirm('Вы уверены? Все настройки будут сброшены к значениям по умолчанию.')) return;
        
        currentConfig = JSON.parse(JSON.stringify(defaultConfig));
        renderSettings();
        markUnsaved();
        showToast('Настройки сброшены. Нажмите "Сохранить" для применения.', 'info');
    });

    // ===================== DOCX UPLOAD =====================
    uploadDocxBtn.addEventListener('click', () => {
        docxUpload.click();
    });

    docxUpload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const uploadText = uploadDocxBtn.querySelector('.upload-text');
        const uploadLoader = uploadDocxBtn.querySelector('.loader');
        
        uploadDocxBtn.disabled = true;
        uploadText.textContent = 'Обработка...';
        uploadLoader.classList.remove('hidden');

        const formData = new FormData();
        formData.append('file', file);

        try {
            const base = window.location.pathname.endsWith('/') ? window.location.pathname : window.location.pathname + '/';
            const res = await fetch(base + 'parse-docx', {
                method: 'POST',
                body: formData
            });

            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || 'Ошибка парсинга DOCX');
            }

            const data = await res.json();
            const extracted = data.extracted;
            
            let updates = [];

            if (extracted.max_payload_kg) {
                document.getElementById('cfg-max-payload').value = extracted.max_payload_kg;
                updates.push(`Грузоподъёмность: ${extracted.max_payload_kg} кг`);
            }

            if (extracted.has_winch) {
                // Check if winch patterns have winch, if not we add it just as an example
                // But realistically, we just ensure it's in the pattern list. 
                const patWinchBody = document.getElementById('section-body-patterns');
                if (patWinchBody && patWinchBody._wn && !patWinchBody._wn.some(p => p.includes('winch'))) {
                    patWinchBody._wn.push('\\bwinch\\b');
                    // re-render the tag input? Best to just re-render settings after updating currentConfig
                    currentConfig.patterns.winch.push('\\bwinch\\b');
                }
                updates.push('Наличие лебёдки (Winch)');
            }

            if (extracted.has_parachute) {
                updates.push('Наличие парашюта');
            }

            if (extracted.comms && extracted.comms.length > 0) {
                updates.push(`Связь: ${extracted.comms.join(', ')}`);
            }
            
            if (extracted.new_topics && extracted.new_topics.length > 0) {
                const patTopicsBody = document.getElementById('section-body-keywords');
                if (patTopicsBody && patTopicsBody._rt) {
                    extracted.new_topics.forEach(t => {
                        if (!patTopicsBody._rt.includes(t)) patTopicsBody._rt.push(t);
                    });
                }
                updates.push(`Новые ключевые слова: ${extracted.new_topics.join(', ')}`);
            }

            if (updates.length > 0) {
                // To cleanly update UI if we modified currentConfig objects, we re-render
                // But first we collect current UI state into currentConfig so we don't lose other unsaved changes
                currentConfig.drone_specs = collectDroneSpecs();
                currentConfig.search = collectSearch();
                currentConfig.keywords = collectKeywords();
                currentConfig.competitors = collectCompetitors();
                currentConfig.patterns = collectPatterns();
                currentConfig.scoring_weights = collectWeights();
                currentConfig.small_biz_codes = collectSmallBiz();
                currentConfig.match_thresholds = collectThresholds();
                
                // apply extracted
                if (extracted.max_payload_kg) currentConfig.drone_specs.max_payload_kg = extracted.max_payload_kg;
                if (extracted.new_topics) {
                    extracted.new_topics.forEach(t => {
                        if (!currentConfig.keywords.rfp_topics.includes(t)) {
                            currentConfig.keywords.rfp_topics.push(t);
                        }
                    });
                }
                
                renderSettings();
                markUnsaved();
                showToast(`Извлечено из DOCX: ${updates.join('; ')}. Не забудьте сохранить!`, 'success');
            } else {
                showToast('В документе не найдено поддерживаемых характеристик дрона.', 'warning');
            }

        } catch (err) {
            console.error(err);
            showToast(err.message, 'error');
        } finally {
            uploadDocxBtn.disabled = false;
            uploadText.textContent = '📄 Автозаполнение из DOCX';
            uploadLoader.classList.add('hidden');
            docxUpload.value = ''; // Reset input
        }
    });

    // ===================== INIT =====================
    loadData();
});
    </script>
</body>
</html>
